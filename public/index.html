<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DentSaaS - Gestão Odontológica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        /* Bloquear scroll do body quando modal está aberto */
        body.modal-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        /* Menu inferior fixo estilo app */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.1);
            border-radius: 25px 25px 0 0;
            padding: 8px 20px;
            z-index: 1000;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 0;
            border-radius: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .nav-item i {
            font-size: 22px;
            transition: all 0.2s ease;
        }
        
        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .nav-item.active i,
        .nav-item.active span {
            color: white !important;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary:active {
            transform: scale(0.96);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .content-area {
            padding: 16px 16px 80px 16px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        
        /* MODAL CORRIGIDO - GARANTE SCROLL */
        .modal-modern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1050;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Container do modal com scroll interno */
        .modal-container {
            background: white;
            border-radius: 28px;
            width: 100%;
            max-width: 450px;
            margin: auto;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Conteúdo com scroll */
        .modal-content-scroll {
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
        }
        
        /* Fixar cabeçalho do modal */
        .modal-header {
            position: sticky;
            top: 0;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 12px;
            margin-bottom: 16px;
            z-index: 10;
        }
        
        /* Botões fixos no final do modal */
        .modal-footer {
            position: sticky;
            bottom: 0;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding-top: 16px;
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }
        
        .input-modern {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .input-modern:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .label-modern {
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 4px;
            display: block;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c7d2fe;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="content-area" id="mainContent">
        <div id="pageContent">
            <div class="text-center text-white py-10">
                <i class="fas fa-tooth text-5xl mb-4"></i>
                <p>Carregando...</p>
            </div>
        </div>
    </div>

    <!-- MENU INFERIOR -->
    <div class="bottom-nav">
        <div class="grid grid-cols-4 gap-2">
            <div onclick="navegarPara('agenda')" id="nav-agenda" class="nav-item active">
                <i class="fas fa-calendar-alt"></i>
                <span>Agenda</span>
            </div>
            <div onclick="navegarPara('pacientes')" id="nav-pacientes" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Pacientes</span>
            </div>
            <div onclick="navegarPara('consultas')" id="nav-consultas" class="nav-item">
                <i class="fas fa-history"></i>
                <span>Histórico</span>
            </div>
            <div onclick="navegarPara('financeiro')" id="nav-financeiro" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Financeiro</span>
            </div>
        </div>
    </div>

    <!-- MODAL PACIENTE (CORRIGIDO - SCROLL FUNCIONAL) -->
    <div id="modal-paciente" class="modal-modern hidden" onclick="fecharModalPaciente(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-content-scroll">
                <div class="modal-header">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold text-gray-800" id="modal-paciente-titulo">👤 Novo Paciente</h3>
                        <button onclick="fecharModalPaciente()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-full"><i class="fas fa-times text-xl"></i></button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Preencha os dados abaixo</p>
                </div>
                <form id="form-paciente">
                    <input type="hidden" id="paciente-id">
                    <div class="form-grid">
                        <div><label class="label-modern">Nome Completo *</label><input type="text" id="paciente-nome-completo" required class="input-modern" placeholder="Digite o nome completo"></div>
                        <div><label class="label-modern">Data Nascimento</label><input type="date" id="paciente-data-nascimento" class="input-modern"></div>
                        <div><label class="label-modern">Celular</label><input type="tel" id="paciente-celular" class="input-modern" placeholder="(00) 00000-0000"></div>
                        <div><label class="label-modern">Telefone</label><input type="tel" id="paciente-telefone-fixo" class="input-modern" placeholder="(00) 0000-0000"></div>
                        <div><label class="label-modern">E-mail</label><input type="email" id="paciente-email" class="input-modern" placeholder="email@exemplo.com"></div>
                        <div><label class="label-modern">Convênio</label><input type="text" id="paciente-convenio" class="input-modern" placeholder="Ex: Unimed, Bradesco..."></div>
                        <div><label class="label-modern">Nº Carteirinha</label><input type="text" id="paciente-carteirinha" class="input-modern"></div>
                        <div><label class="label-modern">Contato Emergência</label><input type="text" id="paciente-emergencia" class="input-modern" placeholder="Nome e telefone"></div>
                        <div><label class="label-modern">CPF</label><input type="text" id="paciente-cpf" class="input-modern" placeholder="000.000.000-00"></div>
                        <div><label class="label-modern">RG</label><input type="text" id="paciente-rg" class="input-modern"></div>
                        <div><label class="label-modern">Endereço</label><input type="text" id="paciente-endereco" class="input-modern" placeholder="Rua, número, bairro"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="label-modern">Cidade</label><input type="text" id="paciente-cidade" class="input-modern"></div>
                            <div><label class="label-modern">Estado</label><input type="text" id="paciente-estado" class="input-modern" placeholder="UF"></div>
                        </div>
                        <div><label class="label-modern">CEP</label><input type="text" id="paciente-cep" class="input-modern" placeholder="00000-000"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn-primary flex-1"><i class="fas fa-save mr-2"></i>Salvar</button>
                        <button type="button" onclick="fecharModalPaciente()" class="btn-secondary flex-1">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL AGENDA -->
    <div id="modal-agenda" class="modal-modern hidden" onclick="fecharModalAgenda(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-content-scroll">
                <div class="modal-header">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold text-gray-800" id="modal-agenda-titulo">Nova Consulta</h3>
                        <button onclick="fecharModalAgenda()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                    </div>
                </div>
                <form id="form-agenda">
                    <input type="hidden" id="consulta-id">
                    <div class="form-grid">
                        <div>
                            <label class="label-modern">Paciente *</label>
                            <select id="consulta-paciente-id" class="input-modern">
                                <option value="">Selecione um paciente</option>
                            </select>
                            <button type="button" onclick="abrirModalPacienteParaAgenda()" class="text-indigo-600 text-sm mt-2 w-full text-center py-2 bg-indigo-50 rounded-xl"><i class="fas fa-plus mr-1"></i>Cadastrar novo paciente</button>
                        </div>
                        <div><label class="label-modern">Data *</label><input type="date" id="consulta-data" required class="input-modern"></div>
                        <div><label class="label-modern">Hora *</label><input type="time" id="consulta-hora" required class="input-modern"></div>
                        <div><label class="label-modern">Valor Total (R$)</label><input type="number" step="0.01" id="consulta-valor" value="0.00" class="input-modern"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn-primary flex-1"><i class="fas fa-save mr-2"></i>Salvar</button>
                        <button type="button" onclick="fecharModalAgenda()" class="btn-secondary flex-1">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL FINANCEIRO -->
    <div id="modal-financeiro" class="modal-modern hidden" onclick="fecharModalFinanceiro(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-content-scroll">
                <div class="modal-header">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold text-gray-800" id="modal-financeiro-titulo">💰 Registrar Pagamento</h3>
                        <button onclick="fecharModalFinanceiro()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                    </div>
                </div>
                <form id="form-financeiro">
                    <input type="hidden" id="recebimento-id">
                    <div class="form-grid">
                        <div>
                            <label class="label-modern">Consulta</label>
                            <select id="recebimento-consulta-id" class="input-modern">
                                <option value="">📋 Selecione uma consulta</option>
                            </select>
                        </div>
                        <div><label class="label-modern">Valor *</label><input type="number" step="0.01" id="recebimento-valor" required class="input-modern" placeholder="0,00"></div>
                        <div><label class="label-modern">Forma Pagamento</label>
                            <select id="recebimento-forma" required class="input-modern">
                                <option value="pix">💳 PIX</option>
                                <option value="dinheiro">💰 Dinheiro</option>
                                <option value="cartao">💳 Cartão</option>
                            </select>
                        </div>
                        <div><label class="label-modern">Data *</label><input type="date" id="recebimento-data" required class="input-modern"></div>
                        <div><label class="label-modern">Descrição</label><textarea id="recebimento-descricao" rows="2" class="input-modern" placeholder="Ex: 1ª parcela, Entrada..."></textarea></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn-success flex-1"><i class="fas fa-save mr-2"></i>Registrar</button>
                        <button type="button" onclick="fecharModalFinanceiro()" class="btn-secondary flex-1">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL PRONTUÁRIO -->
    <div id="modal-prontuario" class="modal-modern hidden" onclick="fecharModalProntuario(event)">
        <div class="modal-container max-w-2xl" onclick="event.stopPropagation()">
            <div class="modal-content-scroll">
                <div class="modal-header">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold text-gray-800" id="prontuario-nome"></h3>
                        <button onclick="fecharModalProntuario()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                    </div>
                </div>
                
                <div class="flex overflow-x-auto gap-2 mb-4 pb-2 border-b">
                    <button onclick="mostrarTabProntuario('dados')" id="tab-dados" class="px-4 py-2 text-sm font-semibold rounded-full bg-indigo-100 text-indigo-600 whitespace-nowrap">📋 Dados</button>
                    <button onclick="mostrarTabProntuario('clinico')" id="tab-clinico" class="px-4 py-2 text-sm font-semibold text-gray-600 whitespace-nowrap">🩺 Clínico</button>
                    <button onclick="mostrarTabProntuario('odontograma')" id="tab-odontograma" class="px-4 py-2 text-sm font-semibold text-gray-600 whitespace-nowrap">🦷 Dentes</button>
                    <button onclick="mostrarTabProntuario('consultas')" id="tab-consultas" class="px-4 py-2 text-sm font-semibold text-gray-600 whitespace-nowrap">📅 Histórico</button>
                    <button onclick="mostrarTabProntuario('anotacoes')" id="tab-anotacoes" class="px-4 py-2 text-sm font-semibold text-gray-600 whitespace-nowrap">📝 Notas</button>
                    <button onclick="mostrarTabProntuario('arquivos')" id="tab-arquivos" class="px-4 py-2 text-sm font-semibold text-gray-600 whitespace-nowrap">📎 Arquivos</button>
                </div>
                
                <div id="tab-dados-content" class="tab-content">Carregando...</div>
                <div id="tab-clinico-content" class="tab-content hidden">Carregando...</div>
                <div id="tab-odontograma-content" class="tab-content hidden">Carregando...</div>
                <div id="tab-consultas-content" class="tab-content hidden">Carregando...</div>
                <div id="tab-anotacoes-content" class="tab-content hidden">Carregando...</div>
                <div id="tab-arquivos-content" class="tab-content hidden">Carregando...</div>
            </div>
        </div>
    </div>

    <script>
        window.API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api' 
            : `${window.location.protocol}//${window.location.hostname}/api`;
            
        // Controle de scroll do body
        function toggleBodyScroll(disable) {
            if (disable) {
                document.body.classList.add('modal-open');
            } else {
                document.body.classList.remove('modal-open');
            }
        }
    </script>
    <script src="/js/agenda.js"></script>
    <script src="/js/financeiro.js"></script>
    <script src="/js/pacientes.js"></script>
    <script src="/js/prontuario.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
